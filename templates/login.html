<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TJ-SC 2026</title>
    <meta name="description" content="Acesse sua plataforma pessoal de estudos para o TJ-SC 2026.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-wrap {
            width: 100%;
            max-width: 440px;
            padding: 1rem;
        }

        .login-card {
            padding: 2.5rem 2.5rem 2rem;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-brand .brand-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .login-brand h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-brand p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.35rem;
        }

        .flash-msg {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .flash-error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #f87171;
        }

        .flash-success {
            background: rgba(52, 211, 153, 0.12);
            border: 1px solid rgba(52, 211, 153, 0.35);
            color: #6ee7b7;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 0.45rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.07);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            margin-top: 0.5rem;
        }

        .btn-login:hover    { opacity: 0.88; transform: translateY(-1px); }
        .btn-login:active   { transform: translateY(0); }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-register {
            width: 100%;
            padding: 0.875rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }

        .btn-register:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(59, 130, 246, 0.06);
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.07);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .register-fields {
            display: none;
        }

        .register-fields.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="glass-card login-card">
            <div class="login-brand">
                <span class="brand-icon">⚖️</span>
                <h1>TJ-SC 2026</h1>
                <p>Plataforma pessoal de estudos</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, msg in messages %}
                    <div class="flash-msg flash-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endwith %}

<form method="POST" action="{{ url_for('login') }}" id="auth-form" autocomplete="on">
                <div class="form-group">
                    <label for="username">Nome de usuário</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="ex: joao_silva"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <div id="register-fields" class="form-group" style="display: none;">
                    <label for="cargo_id">Cargo pretendido</label>
                    <select id="cargo_id" name="cargo_id" class="form-control" required>
                        {% for cargo in cargos %}
                        <option value="{{ cargo.id }}">{{ cargo.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" name="action" value="login" class="btn-login" id="btn-login">
                    Entrar
                </button>

                <div class="divider">ou</div>

                <button type="button" class="btn-register" id="btn-toggle-register">
                    Criar nova conta
                </button>
            </form>

            <form method="POST" action="{{ url_for('login') }}" id="register-form" autocomplete="on" style="display: none;">
                <div class="form-group">
                    <label for="reg-username">Nome de usuário</label>
                    <input
                        type="text"
                        id="reg-username"
                        name="username"
                        placeholder="ex: joao_silva"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="reg-password">Senha</label>
                    <input
                        type="password"
                        id="reg-password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="new-password"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="reg-cargo_id">Cargo pretendido</label>
                    <select id="reg-cargo_id" name="cargo_id" class="form-control" required>
                        {% for cargo in cargos %}
                        <option value="{{ cargo.id }}">{{ cargo.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit" name="action" value="register" class="btn-register" style="background: var(--primary); color: #fff; border: none;">
                    Criar conta
                </button>
            </form>

            <script>
                const authForm = document.getElementById('auth-form');
                const registerForm = document.getElementById('register-form');
                const btnToggle = document.getElementById('btn-toggle-register');
                const btnLogin = document.getElementById('btn-login');

                btnToggle.addEventListener('click', function() {
                    authForm.style.display = 'none';
                    registerForm.style.display = 'block';
                    document.getElementById('reg-username').focus();
                });

                registerForm.querySelector('button[type="submit"]').addEventListener('click', function(e) {
                    if (document.getElementById('reg-username').value && document.getElementById('reg-password').value) {
                        this.name = 'action';
                        this.value = 'register';
                    }
                });
            </script>

            <p class="login-footer">
                Cada conta tem seu próprio progresso e cronograma de estudos.
            </p>
        </div>
    </div>
</body>
</html>
